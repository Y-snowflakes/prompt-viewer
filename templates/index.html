<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
    background:#111;
    color:white;
    font-family:Segoe UI, sans-serif;
    margin:0;
}

/* layout */
.container{
    display:flex;
    height:100vh;
}
.left{
    flex:3;
    overflow:auto;
    padding:20px;
}
.right{
    flex:1;
    border-left:1px solid #333;
    padding:20px;
    overflow:auto;
    background:#181818;
}

/* タイトル */
h2{
    margin-top:0;
    font-size:28px;
}

/* フォーム */
.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
    align-items:center;
}
.controls label{
    font-size:18px;
    font-weight:bold;
}
.controls input{
    background:#222;
    border:1px solid #444;
    color:white;
    padding:8px 10px;
    border-radius:6px;
    font-size:16px;
}
.controls button{
    background:#4a8cff;
    border:none;
    padding:9px 16px;
    border-radius:6px;
    font-size:16px;
    color:white;
    cursor:pointer;
}
.controls button:hover{
    background:#2f6fe0;
}

/* grid */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 10px;
    gap: 12px;
}

.item{
    width:100%;
    overflow:hidden;
    grid-row: span 20;
}

.item img {
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    transition:transform 0.2s;
    display:block;
}

.item img:hover {
    transform: scale(1.03);
}

/* prompt */
.prompt-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.prompt-box{
    font-size:18px;
    line-height:1.6;
    word-break:break-word;
    max-height:150vh;
    overflow:auto;
    padding:6px;
    border-radius:6px;
    background:#222;
    margin-bottom:12px;
}

.prompt-box.negative{
    background:#330000;
    color:#ff6666;
}

.prompt-box.others{
    background:#1a1a33;
    color:#66ccff;
}

/* モーダル */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal img{
    max-width:90%;
    max-height:90%;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="left">

<h2>PNG Prompt Viewer</h2>

<form>
<div class="controls">
<label>Folder</label>
<input name="dir" size="40" value="{{ folder if folder else '' }}">

<label>Search</label>
<input name="q" value="{{ query if query else '' }}">

<button>Search</button>
</div>
</form>

<div class="grid">
{% for i in images %}
<div class="item">

<img src="/images?dir={{folder}}&file={{i.image}}"
     data-prompt="{{i.prompt | e}}"
     data-negative="{{i.negative | e}}"
     data-others="{{i.others | e}}"

     onclick="showPrompt(this)"

     onmousedown="startPress(this)"
     onmouseup="cancelPress()"
     onmouseleave="cancelPress()">

</div>
{% endfor %}
</div>

</div>

<div class="right">

<div class="prompt-block">
<div class="prompt-title">Prompt</div>
<div id="prompt" class="prompt-box"></div>
</div>

<div class="prompt-block">
<div class="prompt-title">Negative Prompt</div>
<div id="negative" class="prompt-box negative"></div>
</div>

<div class="prompt-block">
<div class="prompt-title">Others</div>
<div id="others" class="prompt-box others"></div>
</div>

</div>

</div>

<!-- モーダル -->
<div id="modal" class="modal" onclick="closeModal()">
<img id="modal-img" src="">
</div>

<script>

let pressTimer = null;

function startPress(img){

    pressTimer = setTimeout(()=>{
        openModal(img)
    },500);

}

function cancelPress(){

    clearTimeout(pressTimer);

}

function showPrompt(img){

let text = img.dataset.prompt || ""

let prompt = ""
let negative = ""
let others = ""

/* parameters を除去 */
text = text.replace(/^parameters\s*/i,"").trim()

/* Negative がある場合 */
if(text.includes("Negative prompt:")){

    let parts = text.split("Negative prompt:")
    prompt = parts[0].trim()

    let rest = parts[1]

    if(rest.includes("Steps:")){
        let p = rest.split("Steps:")
        negative = p[0].trim()
        others = "Steps:" + p[1].trim()
    }else{
        negative = rest.trim()
    }

}

/* NegativeなしでStepsあり */
else if(text.includes("Steps:")){

    let parts = text.split("Steps:")
    prompt = parts[0].trim()
    others = "Steps:" + parts[1].trim()

}

/* それ以外 */
else{

    prompt = text

}

/* 表示 */
document.getElementById("prompt").textContent = prompt
document.getElementById("negative").textContent = negative
document.getElementById("others").textContent = others

}
function openModal(img){

let modal = document.getElementById("modal");
let modalImg = document.getElementById("modal-img");

modalImg.src = img.src;
modal.style.display = "flex";

}

function closeModal(){

document.getElementById("modal").style.display = "none";

}

window.addEventListener("DOMContentLoaded", () => {

document.getElementById("prompt").textContent = "";
document.getElementById("negative").textContent = "";
document.getElementById("others").textContent = "";

});

</script>

</body>
</html>
